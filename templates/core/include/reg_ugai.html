{% extends 'core/commons/base.html' %}
{% load static %}

{% block content %}
<div class="container py-4">
  <div class="row justify-content-center mb-4">
    <div class="col-lg-8">
      <div class="card shadow-lg border-0 rounded-4">
        <div class="card-body">
          <h2 class="card-title text-center mb-4 text-success fw-bold">
            Cadastro de UGAI
          </h2>
          <div id="table" class="mb-4"></div>
          <form action="{% url 'manager:reg_ugai' %}" class="needs-validation" method="post" novalidate>
            {% csrf_token %}
            <div class="row g-3 mb-3">
              <div class="col-md-8">
                <label class="form-label fw-semibold">{{ form.nome.label }}</label>
                {{ form.nome }}
              </div>
              <div class="col-md-4">
                <label class="form-label fw-semibold">{{ form.total_vagas.label }}</label>
                {{ form.total_vagas }}
              </div>
            </div>
            <div class="text-center mt-4">
              <button type="submit" class="btn btn-success btn-lg fw-bold shadow rounded-pill px-5" name="form_type" value="aut_ugai">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor"
                  class="bi bi-check-circle me-2" viewBox="0 0 16 16" style="display: inline-block; vertical-align: middle;">
                  <path d="M8 15A7 7 0 1 1 8 1a7 7 0 0 1 0 14zm0 1A8 8 0 1 0 8 0a8 8 0 0 0 0 16z" />
                  <path
                    d="M10.97 4.97a.75.75 0 0 1 1.07 1.05l-3.99 4.99a.75.75 0 0 1-1.08.02L4.324 8.384a.75.75 0 1 1 1.06-1.06l2.094 2.093 3.473-4.425a.267.267 0 0 1 .02-.022z" />
                </svg>Adicionar
                <svg xmlns="http://www.w3.org/2000/svg" width="20" fill="currentColor" class="bi bi-arrow-right-square ms-2"
                  viewBox="0 0 16 16">
                  <path fill-rule="evenodd"
                    d="M15 2a1 1 0 0 0-1-1H2a1 1 0 0 0-1 1v12a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1zM0 2a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2zm4.5 5.5a.5.5 0 0 0 0 1h5.793l-2.147 2.146a.5.5 0 0 0 .708.708l3-3a.5.5 0 0 0 0-.708l-3-3a.5.5 0 1 0-.708.708L10.293 7.5z" />
                </svg>
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock content %}

{% block js %}
  <script src="{% static 'manager/js/data_ugais.js' %}"></script>
{% endblock js %}
